# ======================================================================
#  Stack de la Clinica para DOCKER SWARM  (EP3 - JVY0101)
#
#  Despliegue:   docker stack deploy -c docker-compose.yml clinica --with-registry-auth
#
#  NOTA: 'docker stack deploy' no hace build; las imagenes provienen de
#  Docker Hub y las publica el pipeline CI/CD de cada microservicio.
#
#  Valores a ajustar UNA VEZ antes del primer despliegue:
#   - usuario de Docker Hub en las imagenes (dioocamp)
#   - NOTIFICACIONES_QUEUE_URL con el ACCOUNT_ID real (lo imprime infra/provision.sh)
#   - GATEWAY_SECRET (el mismo valor configurado en el API Gateway)
#  Las credenciales de AWS NO van aqui: se inyectan con
#  scripts/actualizar-credenciales-aws.sh (AWS Academy las rota por sesion).
# ======================================================================
version: "3.8"

services:

  # ------------------------------------------------------------------
  # Base de datos compartida por esquemas (clinica_personal / clinica_citas).
  # Servicio con estado: 1 replica fija en el nodo manager + volumen local.
  # ------------------------------------------------------------------
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: clinica2026
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - clinica-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pclinica2026"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
      resources:
        limits:
          cpus: "1.0"
          memory: 768M

  # ------------------------------------------------------------------
  # Microservicio de personal medico (especialidades y medicos).
  # ------------------------------------------------------------------
  ms-personal-medico:
    image: dioocamp/ms-personal-medico:latest
    environment:
      DB_URL: jdbc:mysql://mysql:3306/clinica_personal?createDatabaseIfNotExist=true&serverTimezone=America/Santiago&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: clinica2026
      GATEWAY_SECRET: cambiar-por-un-secreto-largo
    ports:
      - "8081:8081"
    networks:
      - clinica-net
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 10s
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  # ------------------------------------------------------------------
  # Microservicio de pacientes y citas. Publica eventos CITA_CREADA en
  # la cola SQS; la Lambda 'clinica-notificador' los consume.
  # ------------------------------------------------------------------
  ms-citas:
    image: dioocamp/ms-citas:latest
    environment:
      DB_URL: jdbc:mysql://mysql:3306/clinica_citas?createDatabaseIfNotExist=true&serverTimezone=America/Santiago&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: clinica2026
      MS_PERSONAL_MEDICO_URL: http://ms-personal-medico:8081
      GATEWAY_SECRET: cambiar-por-un-secreto-largo
      NOTIFICACIONES_ENABLED: "true"
      NOTIFICACIONES_QUEUE_URL: https://sqs.us-east-1.amazonaws.com/ACCOUNT_ID/clinica-citas-queue
      AWS_REGION: us-east-1
      # AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_SESSION_TOKEN se
      # agregan con scripts/actualizar-credenciales-aws.sh tras cada deploy.
    ports:
      - "8082:8082"
    networks:
      - clinica-net
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 10s
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

# Red overlay: comunica los contenedores entre nodos del cluster
# (los servicios se resuelven por nombre DNS: mysql, ms-personal-medico...).
networks:
  clinica-net:
    driver: overlay

volumes:
  mysql-data:
